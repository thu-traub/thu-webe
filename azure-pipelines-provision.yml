trigger: none
  # branches:
  #   include:
  #     - test
  # paths:
  #   include:
  #     - project/infra/*
  #     - azure-pipelines-provision.yml

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  azureServiceConnection: webe-demo-test
  terraformWorkingDirectory: project/infra
  resourceGroupName: rg-WEBE
  location: westeurope
  webAppName: thu-st-webe-demo-02
  easyAuth: true
  backendResourceGroupName: rg-tfstate
  backendStorageAccountName: thuifisttfwebe
  backendContainerName: tfstate

stages:
  - stage: Provision
    displayName: Provision infrastructure with Terraform
    jobs:
      - job: TerraformApply
        displayName: Terraform init, plan, apply
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Terraform init, plan, apply
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail

                if ! command -v terraform >/dev/null 2>&1; then
                  echo "Terraform not found on agent. Installing Terraform..."
                  wget -qO- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
                  echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
                  sudo apt-get update
                  sudo apt-get install -y terraform
                fi

                terraform version

                export ARM_USE_AZUREAD=true
                export ARM_STORAGE_USE_AZUREAD=true
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

                # Federated service connections expose an ID token instead of a client secret.
                if [ -n "${idToken:-}" ]; then
                  export ARM_USE_OIDC=true
                  export ARM_OIDC_TOKEN="$idToken"
                elif [ -n "${servicePrincipalKey:-}" ]; then
                  export ARM_CLIENT_SECRET="$servicePrincipalKey"
                fi

                cd "$(terraformWorkingDirectory)"

                terraform init \
                  -upgrade \
                  -reconfigure \
                  -backend-config="resource_group_name=$(backendResourceGroupName)" \
                  -backend-config="storage_account_name=$(backendStorageAccountName)" \
                  -backend-config="container_name=$(backendContainerName)" \
                  -backend-config="key=$(webAppName).tfstate" \
                  -backend-config="use_azuread_auth=true"

                terraform plan \
                  -var "resource_group_name=$(resourceGroupName)" \
                  -var "location=$(location)" \
                  -var "webapp_name=$(webAppName)" \
                  -var "easyauth=$(easyAuth)"

                terraform apply -auto-approve \
                  -var "resource_group_name=$(resourceGroupName)" \
                  -var "location=$(location)" \
                  -var "webapp_name=$(webAppName)" \
                  -var "easyauth=$(easyAuth)"
