trigger:
  branches:
    include:
      - test
  paths:
    include:
      - project/infra/*
      - azure-pipelines-provision.yml

pr: none

pool:
  vmImage: windows-latest

variables:
  azureServiceConnection: webe-demo-test
  terraformWorkingDirectory: project/infra
  resourceGroupName: rg-WEBE
  location: westeurope
  webAppName: thu-st-webe-demo-01
  easyAuth: false

stages:
  - stage: Provision
    displayName: Provision infrastructure with Terraform
    jobs:
      - job: TerraformApply
        displayName: Terraform init, plan, apply
        steps:
          - checkout: self

          - powershell: |
              $ErrorActionPreference = 'Stop'
              if (-not (Get-Command terraform -ErrorAction SilentlyContinue)) {
                choco install terraform -y
              }
              terraform version
            displayName: Ensure Terraform is installed

          - task: AzureCLI@2
            displayName: Terraform apply
            inputs:
              azureSubscription: $(azureServiceConnection)
              addSpnToEnvironment: true
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                $ErrorActionPreference = 'Stop'
                $PSNativeCommandUseErrorActionPreference = $true

                $backendResourceGroup = 'rg-tfstate'
                $backendStorageAccount = 'thuifisttfwebe'
                $backendContainer = 'tfstate'

                # Ensure Terraform uses Entra ID auth for backend/state operations.
                $env:ARM_USE_AZUREAD = 'true'
                $env:ARM_STORAGE_USE_AZUREAD = 'true'

                Write-Host "Signed-in account:"
                az account show --query "{name:name,id:id,tenantId:tenantId,user:user.name}" -o table

                Write-Host "Service connection principal (client id): $env:servicePrincipalId"
                $subscriptionId = az account show --query id --output tsv
                $storageScope = "/subscriptions/$subscriptionId/resourceGroups/$backendResourceGroup/providers/Microsoft.Storage/storageAccounts/$backendStorageAccount"
                Write-Host "Storage scope: $storageScope"
                Write-Host "Attempting role assignment lookup (non-blocking)..."
                try {
                  az role assignment list `
                    --assignee $env:servicePrincipalId `
                    --scope $storageScope `
                    --query "[].{role:roleDefinitionName,scope:scope,principalId:principalId}" `
                    --output table
                }
                catch {
                  Write-Warning "Role assignment lookup requires additional control-plane permissions; continuing to data-plane validation."
                }

                Write-Host "Validating data-plane access to Terraform state container..."
                az storage blob list `
                  --account-name $backendStorageAccount `
                  --container-name $backendContainer `
                  --auth-mode login `
                  --num-results 1 `
                  --output table

                terraform -chdir="$(terraformWorkingDirectory)" init -upgrade -reconfigure

                terraform -chdir="$(terraformWorkingDirectory)" plan `
                  -var "resource_group_name=$(resourceGroupName)" `
                  -var "location=$(location)" `
                  -var "webapp_name=$(webAppName)" `
                  -var "easyauth=$(easyAuth)"

                terraform -chdir="$(terraformWorkingDirectory)" apply -auto-approve `
                  -var "resource_group_name=$(resourceGroupName)" `
                  -var "location=$(location)" `
                  -var "webapp_name=$(webAppName)" `
                  -var "easyauth=$(easyAuth)"
