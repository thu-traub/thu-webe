trigger:
  branches:
    include:
      - test
      - prod

stages:
  - template: deploy-webapp.yml
    parameters:
      stageName: Deploy_Test
      environmentName: test
      branchName: refs/heads/test
      resourceGroupName: rg-WEBE
      webAppName: thu-st-webe-demo-01
      azureServiceConnection: webe-demo-test

  - template: deploy-webapp.yml
    parameters:
      stageName: Deploy_Prod
      environmentName: prod
      branchName: refs/heads/prod
      resourceGroupName: rg-ifi-st-01
      webAppName: thu-st-webe-demo-02
      azureServiceConnection: webe-demo-prod